<!DOCTYPE html>
<html lang="{{lang}}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- SEO TITLE -->
    <title>Sản phẩm {{brand}} | Rheintacho Việt Nam | Nhà phân phối chính thức</title>

    <!-- SEO META -->
    <meta name="description" content="{{description}}">
    <meta name="keywords" content="{{keywords}}">
    <meta name="author" content="Fast Group Engineering">
    <meta name="robots" content="index, follow">
    <meta name="language" content="{{lang}}">
    <meta http-equiv="content-language" content="{{lang}}">

    <!-- CANONICAL -->
    <link rel="canonical" href="{{url}}">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon-16x16.png">
    <link rel="manifest" href="/assets/images/site.webmanifest">

    <link rel="preload" as="image" href="{{image}}">
    <link rel="alternate" hreflang="vi" href="{{url_vi}}">
    <link rel="alternate" hreflang="en" href="{{url_en}}">
    <link rel="alternate" hreflang="x-default" href="{{url_vi}}">

    <!-- OPEN GRAPH -->
    <meta property="og:title" content="{{brand}}">
    <meta property="og:description" content="{{description}}">
    <meta property="og:image" content="{{main_image}}">
    <meta property="og:url" content="{{url}}">
    <meta property="og:type" content="product">
    <meta property="og:locale" content="{{locale}}">

    <!-- TWITTER -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{brand}}">
    <meta name="twitter:description" content="{{description}}">
    <meta name="twitter:image" content="{{main_image}}">

    <!-- CSS -->
    <link rel="stylesheet" href="/assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="/assets/css/templatemo.css">
    <link rel="stylesheet" href="/assets/css/custom.css">

    <!-- Load fonts style after rendering the layout styles -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;200;300;400;500;700;900&display=swap">
    <link rel="stylesheet" href="/assets/css/fontawesome.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- SCHEMA PRODUCT -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org/",
      "@type": "Product",
      "name": "{{brand}}",
      "image": ["{{main_image}}"],
      "description": "{{description}}",
      "sku": "{{brand}}",
      "brand": {
        "@type": "Brand",
        "name": "Rheintacho"
      },
        "manufacturer": {
        "@type": "Organization",
        "name": "Rheintacho",
        "address": {
            "@type": "PostalAddress",
            "addressCountry": "Germany"
        }
        },
        "offers": {
            "@type": "Offer",
            "priceCurrency": "VND",
            "availability": "https://schema.org/InStock",
            "url": "{{url}}",
            "price": "0",
            "priceValidUntil": "2026-12-31",
            "seller": {
                "@type": "Organization",
                "name": "Fast Group Engineering"
            }
        }, 
    }
    </script>

</head>

<body>
    <!-- Start Top Nav -->
    <div id="header"></div>
    <!-- Close Header -->

    <!-- Start Categories of The Month -->
    <section class="container py-5">
        <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb" id="breadcrumb">
                {{breadcrumb}}
            </ol>
        </nav>
        <div class="text-center mb-4">
            <h2 id="categoryTitle" class="fw-bold"><span class="text-success">{{title}}</span></h2>
        </div>

        <!-- SEARCH + FILTER -->
        <div class="col-md-12 mb-2">
            <input type="text" id="searchInput" class="form-control" placeholder="Search products...">
        </div>

        <!-- PRODUCT GRID -->
        <div class="row" id="productList">
            {{productList}}
        </div>

        <div class="bg-light p-5 rounded text-center">

            <h4>
                Bạn cần tư vấn sản phẩm?
            </h4>

            <p>

                Liên hệ để được tư vấn kỹ thuật
                và báo giá nhanh chóng

            </p>

            <a href="tel:+84 938 888 958" class="btn btn-success px-4 py-2">
                <i class="fa fa-phone fa-fw"></i> Liên hệ ngay (+84) 938 888 958
            </a>

        </div>

    </section>
    <!-- End Categories of The Month -->


    <!-- Start Footer -->
    <div id="footer"></div>

    <!-- Start Script -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="/assets/js/jquery-migrate-1.2.1.min.js"></script>
    <script src="/assets/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/templatemo.js"></script>
    <script src="/assets/js/main.js"></script>
    <!-- End Script -->
</body>

</html>
