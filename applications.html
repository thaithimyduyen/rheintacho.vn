<!DOCTYPE html>
<html lang="{{lang}}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- SEO TITLE -->
    <title>Ứng dụng đo tốc độ công nghiệp | Rheintacho Việt Nam</title>

    <!-- SEO META -->
    <meta name="description"
        content="Khám phá các ứng dụng đo tốc độ trong công nghiệp như động cơ, băng tải, turbine, máy bơm và hệ thống quay. Giải pháp Rheintacho giúp tăng độ chính xác và tối ưu hiệu suất.">
    <meta name="keywords"
        content="đo tốc độ động cơ, đo rpm, tachometer, ứng dụng đo tốc độ, cảm biến tốc độ công nghiệp, đo tốc độ băng tải, turbine, máy bơm">
    <meta name="author" content="Fast Group Engineering">
    <meta name="robots" content="index, follow">
    <meta name="language" content="{{lang}}">
    <meta http-equiv="content-language" content="{{lang}}">

    <!-- CANONICAL -->
    <link rel="canonical" href="{{url}}">

    <!-- HREFLANG -->
    <link rel="alternate" hreflang="vi" href="https://rheintacho.com.vn/vi/ung-dung/">
    <link rel="alternate" hreflang="en" href="https://rheintacho.com.vn/en/applications/">
    <link rel="alternate" hreflang="x-default" href="https://rheintacho.com.vn/en/applications/">

    <!-- CSS -->
    <link rel="stylesheet" href="/assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="/assets/css/templatemo.css">
    <link rel="stylesheet" href="/assets/css/custom.css">

    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <link href="/assets/images/logo.png" rel="apple-touch-icon" />
    <link href="/assets/images/apple-touch-icon.png" rel="apple-touch-icon" sizes="180x180" />
    <link href="/assets/images/favicon-32x32.png" rel="icon" sizes="32x32" type="image/png" />
    <link href="/assets/images/favicon-16x16.png" rel="icon" sizes="16x16" type="image/png" />

    <!-- FONT -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap">
</head>

<body>

    <div id="header"></div>

    <section class="container py-5">

        <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb" id="breadcrumb">
                {{breadcrumb}}
            </ol>
        </nav>

        <!-- TITLE -->
        <h1 class="fw-bold mb-3">{{title}}</h1>

        <!-- INTRO (SEO cực quan trọng) -->
        <p class="mb-5">
            {{short_description}}
        </p>

        <!-- APPLICATION LIST -->
        <div class="row">
            {{items}}
        </div>
    </section>

    <div id="footer"></div>

    <!-- SCRIPT -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="/assets/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/main.js"></script>

</body>

</html>
